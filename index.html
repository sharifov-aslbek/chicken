<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caravan Chicken — Halol · Pokiza · Tez</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Pacifico&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Minimal logo loader, shown instantly until the Vue app mounts -->
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #ff540a 0%, #ff8049 100%);
        transition: opacity 0.4s ease;
      }
      #app-loader.is-hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-loader img {
        width: 132px;
        height: auto;
        animation: app-loader-pulse 1.2s ease-in-out infinite;
      }
      @keyframes app-loader-pulse {
        0%, 100% { opacity: 0.45; transform: scale(0.97); }
        50% { opacity: 1; transform: scale(1); }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-loader img { animation: none; }
      }
    </style>
    <div id="app-loader">
      <img src="/logo-loader.svg" alt="Caravan Chicken" />
    </div>
    <script>
      // Product detail pages render their own skeletons, so the logo loader
      // is skipped there. Runs synchronously — removed before first paint.
      if (/^\/mahsulotlar\/[^/]+/.test(location.pathname)) {
        document.getElementById('app-loader').remove()
      }
    </script>

    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
